<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyRAG — Python Docs AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --bg4: #222230;
      --border: rgba(120, 120, 200, 0.12);
      --border2: rgba(120, 120, 200, 0.22);
      --accent: #00e5a0;
      --accent2: #00b87a;
      --accent-dim: rgba(0, 229, 160, 0.1);
      --accent-dim2: rgba(0, 229, 160, 0.06);
      --text: #e8e8f0;
      --text2: #9090a8;
      --text3: #5a5a72;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 10px;
      --radius-lg: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 160, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 160, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .logo-text {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 18px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--font-mono);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }

    .dot.offline {
      background: #666;
      box-shadow: none;
      animation: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .vector-count {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--font-mono);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg2);
    }

    .main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
    }

    .welcome {
      padding: 60px 0 40px;
      text-align: center;
    }

    .welcome-title {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .welcome-title span {
      color: var(--accent);
    }

    .welcome-sub {
      color: var(--text2);
      font-size: 14px;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto 32px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 8px;
    }

    .suggestion {
      padding: 8px 14px;
      border: 1px solid var(--border2);
      border-radius: 20px;
      background: var(--bg2);
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-mono);
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim2);
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--bg4) transparent;
    }

    .chat-area::-webkit-scrollbar {
      width: 4px;
    }

    .chat-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-area::-webkit-scrollbar-thumb {
      background: var(--bg4);
      border-radius: 2px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-user {
      align-items: flex-end;
    }

    .msg-ai {
      align-items: flex-start;
    }

    .msg-bubble-user {
      max-width: 75%;
      padding: 12px 16px;
      background: var(--accent-dim);
      border: 1px solid rgba(0, 229, 160, 0.2);
      border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    .msg-label {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 0 4px;
    }

    .msg-ai-content {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
      overflow: hidden;
    }

    .ai-answer {
      padding: 20px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
    }

    .ai-answer p {
      margin-bottom: 12px;
    }

    .ai-answer p:last-child {
      margin-bottom: 0;
    }

    .ai-answer code {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--accent);
      font-family: var(--font-mono);
    }

    .ai-answer pre {
      background: var(--bg3) !important;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      font-size: 13px;
    }

    .ai-answer pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: 13px;
    }

    .ai-answer ul,
    .ai-answer ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }

    .ai-answer li {
      margin-bottom: 4px;
    }

    .ai-meta {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg3);
    }

    .ai-meta-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .latency-badge {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--font-mono);
    }

    .latency-badge span {
      color: var(--accent);
    }

    .chunks-badge {
      font-size: 11px;
      color: var(--text3);
    }

    .sources-toggle {
      font-size: 11px;
      color: var(--text2);
      cursor: pointer;
      background: none;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      font-family: var(--font-mono);
      transition: all 0.15s;
    }

    .sources-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .sources-panel {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .sources-panel.open {
      display: flex;
    }

    .sources-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text3);
      margin-bottom: 4px;
    }

    .source-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg4);
      border-radius: var(--radius);
      text-decoration: none;
      transition: all 0.15s;
      border: 1px solid transparent;
    }

    .source-item:hover {
      border-color: var(--border2);
      background: var(--bg3);
    }

    .source-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .badge-beginner {
      background: rgba(0, 184, 122, 0.15);
      color: #00b87a;
    }

    .badge-intermediate {
      background: rgba(90, 90, 255, 0.15);
      color: #8888ff;
    }

    .badge-advanced {
      background: rgba(255, 100, 100, 0.15);
      color: #ff8888;
    }

    .source-title {
      font-size: 12px;
      color: var(--text2);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-link {
      font-size: 11px;
      color: var(--text3);
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 16px 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
      width: fit-content;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingBounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      30% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    .typing-text {
      font-size: 12px;
      color: var(--text3);
      margin-left: 4px;
    }

    .input-area {
      position: sticky;
      bottom: 0;
      padding: 20px 0 28px;
      background: linear-gradient(transparent, var(--bg) 30%);
      z-index: 10;
    }

    .input-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text3);
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-mono);
      transition: all 0.15s;
    }

    .filter-btn:hover {
      border-color: var(--border2);
      color: var(--text2);
    }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim2);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within {
      border-color: rgba(0, 229, 160, 0.35);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-mono);
      resize: none;
      line-height: 1.6;
      max-height: 120px;
      scrollbar-width: none;
    }

    textarea::placeholder {
      color: var(--text3);
    }

    textarea::-webkit-scrollbar {
      display: none;
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .send-btn:hover {
      background: var(--accent2);
    }

    .send-btn:disabled {
      background: var(--bg4);
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 16px;
      height: 16px;
      fill: var(--bg);
    }

    .send-btn:disabled svg {
      fill: var(--text3);
    }

    .input-hint {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      margin-top: 8px;
    }

    .input-hint kbd {
      padding: 1px 5px;
      border: 1px solid var(--border2);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text3);
    }

    .error-msg {
      padding: 12px 16px;
      background: rgba(255, 80, 80, 0.08);
      border: 1px solid rgba(255, 80, 80, 0.2);
      border-radius: var(--radius);
      color: #ff8888;
      font-size: 13px;
    }

    @media (max-width: 640px) {
      header {
        padding: 16px;
      }

      .main {
        padding: 0 16px;
      }

      .welcome-title {
        font-size: 28px;
      }

      .header-right .vector-count {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="grid-bg"></div>

  <header>
    <div class="logo" onclick="goHome()" style="cursor:pointer;" title="Back to home">
      <div class="logo-icon">Py</div>
      <div>
        <div class="logo-text">PyRAG</div>
        <div class="logo-sub">Python Docs Intelligence</div>
      </div>
    </div>
    <div class="header-right">
      <div class="vector-count" id="vectorCount">— vectors</div>
      <div class="status-dot">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">connecting</span>
      </div>
    </div>
  </header>

  <div class="main">
    <div id="welcomeScreen" class="welcome">
      <div class="welcome-title">Ask Python.<br><span>Get Answers.</span></div>
      <p class="welcome-sub">Powered by RAG — retrieves answers directly from official Python documentation using
        GPT-4o.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="fillQuestion(this)">What is a Python decorator?</button>
        <button class="suggestion" onclick="fillQuestion(this)">How does asyncio event loop work?</button>
        <button class="suggestion" onclick="fillQuestion(this)">Explain Python generators</button>
        <button class="suggestion" onclick="fillQuestion(this)">What is a metaclass?</button>
        <button class="suggestion" onclick="fillQuestion(this)">How does functools.wraps work?</button>
        <button class="suggestion" onclick="fillQuestion(this)">Difference between list and tuple</button>
      </div>
    </div>

    <div id="chatArea" class="chat-area" style="display:none;"></div>

    <div class="input-area">
      <div class="input-controls">
        <button class="filter-btn active" data-section="" onclick="setFilter(this)">all levels</button>
        <button class="filter-btn" data-section="beginner" onclick="setFilter(this)">beginner</button>
        <button class="filter-btn" data-section="intermediate" onclick="setFilter(this)">intermediate</button>
        <button class="filter-btn" data-section="advanced" onclick="setFilter(this)">advanced</button>
      </div>
      <div class="input-row">
        <textarea id="questionInput" placeholder="Ask anything about Python..." rows="1" onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendQuestion()" disabled>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
          </svg>
        </button>
      </div>
      <div class="input-hint">
        <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line
      </div>
    </div>
  </div>

  <script>
    const API = 'https://gf3rbmi777.execute-api.us-east-1.amazonaws.com';
    let activeSection = '';
    let isLoading = false;
    let chatStarted = false;

    const input = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatArea = document.getElementById('chatArea');
    const welcomeScreen = document.getElementById('welcomeScreen');

    input.addEventListener('input', () => {
      sendBtn.disabled = !input.value.trim() || isLoading;
    });

    // Handle browser back button
    window.addEventListener('popstate', (e) => {
      if (e.state && e.state.view === 'welcome') {
        showWelcome();
      }
    });

    function goHome() {
      if (!chatStarted) return;
      history.pushState({ view: 'welcome' }, '', '');
      showWelcome();
    }

    function showWelcome() {
      chatArea.style.display = 'none';
      chatArea.innerHTML = '';
      welcomeScreen.style.display = 'block';
      chatStarted = false;
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      // reset section filter
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.filter-btn[data-section=""]').classList.add('active');
      activeSection = '';
    }

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/health`);
        const data = await res.json();
        document.getElementById('statusDot').className = 'dot';
        document.getElementById('statusText').textContent = 'live';
        document.getElementById('vectorCount').textContent = `${data.index_vectors.toLocaleString()} vectors`;
      } catch {
        document.getElementById('statusDot').className = 'dot offline';
        document.getElementById('statusText').textContent = 'offline';
        document.getElementById('vectorCount').textContent = 'offline';
      }
    }

    function setFilter(btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeSection = btn.dataset.section;
    }

    function fillQuestion(btn) {
      input.value = btn.textContent;
      input.focus();
      autoResize(input);
      sendBtn.disabled = false;
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendQuestion();
      }
    }

    function showChat() {
      if (!chatStarted) {
        history.pushState({ view: 'chat' }, '', '');
        chatStarted = true;
      }
      welcomeScreen.style.display = 'none';
      chatArea.style.display = 'flex';
    }

    function appendUserMsg(text) {
      showChat();
      const msg = document.createElement('div');
      msg.className = 'msg msg-user';
      msg.innerHTML = `
    <div class="msg-label">you</div>
    <div class="msg-bubble-user">${escapeHtml(text)}</div>
  `;
      chatArea.appendChild(msg);
      scrollToBottom();
    }

    function appendTyping() {
      const el = document.createElement('div');
      el.className = 'msg msg-ai';
      el.id = 'typingIndicator';
      el.innerHTML = `
    <div class="msg-label">pyrag</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <span class="typing-text">retrieving from docs</span>
    </div>
  `;
      chatArea.appendChild(el);
      scrollToBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function appendAIMsg(data) {
      const msg = document.createElement('div');
      msg.className = 'msg msg-ai';

      const parsed = marked.parse(data.answer);
      const latency = (data.latency_ms / 1000).toFixed(2);

      const sourcesHtml = data.sources.map(s => `
    <a class="source-item" href="${s.url}" target="_blank" rel="noopener">
      <span class="source-badge badge-${s.section}">${s.section}</span>
      <span class="source-title">${escapeHtml(s.title)}</span>
      <span class="source-link">↗</span>
    </a>
  `).join('');

      const msgId = 'msg_' + Date.now();

      msg.innerHTML = `
    <div class="msg-label">pyrag</div>
    <div class="msg-ai-content">
      <div class="ai-answer">${parsed}</div>
      <div class="ai-meta">
        <div class="ai-meta-left">
          <span class="latency-badge">⚡ <span>${latency}s</span></span>
          <span class="chunks-badge">${data.chunks_used} chunks retrieved</span>
        </div>
        <button class="sources-toggle" onclick="toggleSources('${msgId}')">
          ${data.sources.length} sources
        </button>
      </div>
      <div class="sources-panel" id="${msgId}">
        <div class="sources-label">sources</div>
        ${sourcesHtml}
      </div>
    </div>
  `;

      chatArea.appendChild(msg);

      msg.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
      });

      scrollToBottom();
    }

    function appendError(msg) {
      const el = document.createElement('div');
      el.className = 'msg msg-ai';
      el.innerHTML = `
    <div class="msg-label">pyrag</div>
    <div class="error-msg">⚠ ${escapeHtml(msg)}</div>
  `;
      chatArea.appendChild(el);
      scrollToBottom();
    }

    function toggleSources(id) {
      const panel = document.getElementById(id);
      panel.classList.toggle('open');
      const btn = panel.previousElementSibling.querySelector('.sources-toggle');
      btn.textContent = panel.classList.contains('open')
        ? 'hide sources'
        : `${panel.querySelectorAll('.source-item').length} sources`;
    }

    async function sendQuestion() {
      const question = input.value.trim();
      if (!question || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      appendUserMsg(question);
      appendTyping();

      const body = { question, top_k: 8 };
      if (activeSection) body.section = activeSection;

      try {
        const res = await fetch(`${API}/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        removeTyping();
        appendAIMsg(data);
      } catch (err) {
        removeTyping();
        const msg = err.message.includes('Failed to fetch')
          ? 'Could not reach the API. Check your connection or try again.'
          : err.message;
        appendError(msg);
      } finally {
        isLoading = false;
        sendBtn.disabled = !input.value.trim();
      }
    }

    function scrollToBottom() {
      setTimeout(() => {
        chatArea.scrollTop = chatArea.scrollHeight;
      }, 50);
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    checkHealth();
  </script>
</body>

</html>
